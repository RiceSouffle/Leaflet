<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Small Promo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { margin: 0; padding: 0; }
  .canvas { width: 440px; height: 280px; background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #818cf8 100%); display: flex; align-items: center; justify-content: center; gap: 28px; padding: 0 32px; }
  .icon { width: 72px; height: 72px; }
  .text h1 { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 28px; font-weight: 700; color: white; margin: 0 0 6px 0; }
  .text p { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: rgba(255,255,255,0.85); margin: 0; line-height: 1.4; }
</style>
</head>
<body>
<div class="canvas">
  <img src="../public/icon/icon.svg" class="icon" />
  <div class="text">
    <h1>Leaflet</h1>
    <p>Save, restore &amp; manage<br>your tab sessions</p>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</body>
</html>
